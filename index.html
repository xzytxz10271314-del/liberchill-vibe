<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liberchill Vibe</title>
    <meta
      name="description"
      content="A dreamy sakura-petal landing page with a floating Liberchill logo."
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="scene-shell" id="sceneShell">
      <div class="scene-world" id="sceneWorld">
        <div class="scene-layer scene-layer-atmosphere" aria-hidden="true">
          <div class="scene-sheen"></div>
          <div class="scene-texture"></div>
          <div class="background-glow background-glow-left"></div>
          <div class="background-glow background-glow-right"></div>
          <div class="background-blush"></div>
        </div>

        <div class="scene-layer scene-layer-depth" aria-hidden="true">
          <div class="scene-backdrop"></div>
          <div class="scene-floor"></div>
        </div>

        <div class="scene-layer scene-layer-petals" aria-hidden="true">
          <canvas class="petal-canvas" id="petalCanvas"></canvas>
        </div>

        <div class="scene-layer scene-layer-foreground" aria-hidden="true">
          <div class="foreground-haze foreground-haze-left"></div>
          <div class="foreground-haze foreground-haze-right"></div>
        </div>

        <main class="logo-spot">
          <div class="logo-stage" id="logoStage">
            <div class="logo-aura" aria-hidden="true"></div>
            <div class="logo-float">
              <div class="logo-shadow" aria-hidden="true"></div>
              <div class="logo-shell" id="logoShell">
                <img
                  class="logo-image"
                  src="assets/liberchill-logo.png"
                  alt="Liberchill logo"
                />
              </div>
            </div>
            <div class="logo-ring" aria-hidden="true"></div>
          </div>
        </main>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
