<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liberchill Vibe</title>
    <meta
      name="description"
      content="A dreamy sakura-petal landing page with a floating Liberchill logo."
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <canvas class="petal-canvas" id="petalCanvas" aria-hidden="true"></canvas>

    <div class="background-glow background-glow-left" aria-hidden="true"></div>
    <div class="background-glow background-glow-right" aria-hidden="true"></div>
    <div class="background-blush" aria-hidden="true"></div>

    <main class="logo-spot">
      <div class="logo-stage" id="logoStage">
        <div class="logo-aura" aria-hidden="true"></div>
        <div class="logo-float">
          <div class="logo-shadow" aria-hidden="true"></div>
          <div class="logo-shell" id="logoShell">
            <img
              class="logo-image"
              src="assets/liberchill-logo.png"
              alt="Liberchill logo"
            />
          </div>
        </div>
        <div class="logo-ring" aria-hidden="true"></div>
      </div>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
